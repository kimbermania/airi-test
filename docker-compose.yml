version: "3.8"

services:
  # AIRI Stage Web (프론트엔드 - 정적 파일 서빙)
  # Live2D / TTS (Kokoro 82M Q8 WASM) / STT 는 브라우저(메인 PC)에서 실행됨
  # Gemini API 호출도 브라우저에서 직접 발생 → 나스는 nginx 서빙만 담당
  airi-web:
    build:
      context: .
      dockerfile: Dockerfile.n100
      # NOTICE: VITE_ 접두사 변수는 빌드 타임에 번들에 하드코딩되므로
      # docker-compose environment 섹션이 아닌 build.args 를 통해 전달해야 합니다.
      # Portainer → Stack → Environment variables 에 아래 변수들을 입력하세요.
      args:
        - VITE_LLM_PROVIDER=${LLM_PROVIDER:-google}
        - VITE_LLM_API_KEY=${LLM_API_KEY}
        - VITE_LLM_MODEL=${LLM_MODEL:-gemini-2.0-flash}
    container_name: airi-web
    restart: unless-stopped
    ports:
      - "${AIRI_WEB_PORT:-3000}:80"
    networks:
      - airi-net
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # Nginx Proxy Manager (리버스 프록시 + SSL 인증서 자동 관리)
  npm:
    image: jc21/nginx-proxy-manager:latest
    container_name: airi-npm
    restart: unless-stopped
    ports:
      - "${NPM_HTTP_PORT:-80}:80"
      - "${NPM_HTTPS_PORT:-443}:443"
      - "${NPM_ADMIN_PORT:-81}:81"
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt
    networks:
      - airi-net
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

networks:
  airi-net:
    driver: bridge

volumes:
  npm_data:
  npm_letsencrypt:
